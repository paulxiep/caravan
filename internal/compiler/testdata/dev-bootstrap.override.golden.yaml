#  Generated by `caravan compile --target=dev-bootstrap`. Do not edit by hand.
#  Layer this override atop the hand-authored docker-compose.yaml:
#    docker compose \
#      -f infra/docker-compose.yaml \
#      -f infra/dev-bootstrap/generated/docker-compose.override.generated.yaml \
#      --profile app up

services:
  processing:
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_REGION: us-east-1
      AWS_SECRET_ACCESS_KEY: minioadmin
      DATABASE_URL: postgresql://caravan:caravan@postgres:5432/caravan
      QUEUE_URL: redis://redis:6379
      S3_ENDPOINT_URL: http://minio:9000
      CARAVAN_RPC_PEERS: '{"LLMExtraction":{"mode":"http","url":"http://llm-extractor:8080"}}'
      CARAVAN_RPC_SHARED_SECRET: dev-secret-placeholder
    depends_on:
      llm-extractor:
        condition: service_started
  llm-extractor:
    build:
      context: ..
      dockerfile: services/processing/Dockerfile
    env_file:
      - ../.env
    environment:
      CARAVAN_RPC_SHARED_SECRET: dev-secret-placeholder
      CARAVAN_RPC_PEERS: '{"LLMExtraction":{"mode":"http","url":"http://llm-extractor:8080"}}'
    command:
      - "python"
      - "-m"
      - "caravan_rpc.serve"
      - "--interface"
      - "LLMExtraction"
      - "--impl"
      - "invoice_processing.extraction:GeminiExtractor"
      - "--port"
      - "8080"
    profiles:
      - app
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command:
      - "server"
      - "/data"
      - "--console-address"
      - ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    profiles:
      - app
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: caravan
      POSTGRES_PASSWORD: caravan
      POSTGRES_DB: caravan
    ports:
      - "5432:5432"
    profiles:
      - app
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    profiles:
      - app

name: Publish Rust SDK to crates.io

# Manual-trigger workflow that publishes the Caravan Rust SDK to crates.io.
# Two crates ship together: `caravan-rpc-macros` (the proc-macro crate) must
# publish FIRST so that crates.io recognizes it when `caravan-rpc` (which
# depends on it) is uploaded.
#
# crates.io does NOT support OIDC trusted publishers (as of late 2025) —
# auth uses a static API token. We store it as a GitHub secret named
# CARGO_REGISTRY_TOKEN, scoped to the `crates` environment.
#
# Setup (one-time):
# 1. Generate a token: https://crates.io/me → Account Settings → API Tokens
#    → New Token. Scopes for the first publish: publish-new + publish-update.
#    (After the crates exist, regenerate with just publish-update and
#    restrict to the "caravan-rpc" + "caravan-rpc-macros" crates.)
# 2. Create the GitHub environment: caravan repo Settings → Environments →
#    New → name: `crates`. Optional: require reviewers + restrict to `main`.
# 3. Add the secret: environment `crates` → Add secret →
#    name: CARGO_REGISTRY_TOKEN, value: <paste the token from step 1>.
#
# Usage: bump versions in BOTH rpc/rust/caravan-rpc/Cargo.toml AND
# rpc/rust/caravan-rpc-macros/Cargo.toml (kept in lockstep), commit, trigger
# this workflow. Default is dry-run; flip the input to publish for real.
#
# Reminder: crates.io publishes are IRREVERSIBLE after 72 hours. You can
# `cargo yank` to mark a version unusable but the name + version stays
# claimed forever. Use dry-run first.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (--dry-run, no actual publish). Flip to false to actually publish."
        required: true
        default: true
        type: boolean

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment:
      name: crates
      url: https://crates.io/crates/caravan-rpc
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rpc/rust/target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('rpc/rust/**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-publish-

      - name: List files that will ship (caravan-rpc-macros)
        working-directory: rpc/rust/caravan-rpc-macros
        run: cargo package --list

      - name: List files that will ship (caravan-rpc)
        working-directory: rpc/rust/caravan-rpc
        run: cargo package --list --allow-dirty

      - name: Build + verify package (caravan-rpc-macros)
        working-directory: rpc/rust/caravan-rpc-macros
        run: cargo package

      - name: Publish caravan-rpc-macros (dry-run)
        if: inputs.dry_run
        working-directory: rpc/rust/caravan-rpc-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --dry-run

      - name: Publish caravan-rpc-macros (REAL — irreversible after 72h)
        if: '!inputs.dry_run'
        working-directory: rpc/rust/caravan-rpc-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: Wait for caravan-rpc-macros to be indexed (REAL only)
        if: '!inputs.dry_run'
        # crates.io indexing time is variable — usually under a minute,
        # occasionally several. Poll the sparse index for caravan-rpc-macros
        # 0.1.0 instead of a fixed sleep so the dependent caravan-rpc
        # publish below doesn't fire before the dep is resolvable. Caps
        # at 5 minutes to avoid an infinite wait on a real outage.
        run: |
          for i in $(seq 1 60); do
            if curl -fsSL https://index.crates.io/ca/ra/caravan-rpc-macros 2>/dev/null | grep -q '"vers":"0.1.0"'; then
              echo "caravan-rpc-macros 0.1.0 visible in sparse index after $((i*5))s"
              exit 0
            fi
            sleep 5
          done
          echo "Timed out after 5 min waiting for caravan-rpc-macros 0.1.0 to appear" >&2
          exit 1

      - name: Verify caravan-rpc package shape (dry-run mode)
        if: inputs.dry_run
        working-directory: rpc/rust/caravan-rpc
        # caravan-rpc can't be `cargo publish --dry-run`-ed before
        # caravan-rpc-macros is on crates.io: cargo strips the path-dep
        # in the packaged Cargo.toml and resolves the version against
        # crates.io. Same trap applies to `cargo package` by default —
        # it verifies the tarball by building it, which re-triggers the
        # crates.io lookup. `--no-verify` skips that build step so we
        # still get manifest validation + the file list (the actual
        # signal a dry-run gives: what would ship). Real publish runs
        # only after macros is live (next step) — at which point both
        # `cargo publish` calls resolve correctly in order.
        run: cargo package --allow-dirty --list && cargo package --allow-dirty --no-verify

      - name: Publish caravan-rpc (REAL — irreversible after 72h)
        if: '!inputs.dry_run'
        working-directory: rpc/rust/caravan-rpc
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
